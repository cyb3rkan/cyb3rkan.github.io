<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credentials — Erkan ŞAHİN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="shared.css">
<style>
.filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem}
.fchip{font-size:12px;padding:5px 14px;border-radius:100px;font-family:'DM Mono',monospace;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);display:flex;align-items:center;gap:6px}
.fchip:hover{color:var(--text-secondary);border-color:rgba(255,255,255,0.2)}
.fchip.active{color:var(--cyan);border-color:rgba(0,217,255,0.3);background:rgba(0,217,255,0.07)}
.cnt{font-size:10px;background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:100px;color:var(--text-muted)}
.fchip.active .cnt{background:rgba(0,217,255,0.15);color:var(--cyan)}

.year-hd{font-size:12px;font-family:'DM Mono',monospace;color:var(--cyan);letter-spacing:0.08em;padding:0.4rem 0;display:flex;align-items:center;gap:0.75rem;margin-bottom:0.6rem}
.year-hd::after{content:'';flex:1;height:1px;background:rgba(0,217,255,0.12)}

.cred-list{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.5rem}
.cred-item{
  display:flex;align-items:center;gap:0.875rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:0.875rem 1.125rem;transition:border-color 0.2s,transform 0.2s;
  text-decoration:none;cursor:default;
}
.cred-item:hover{border-color:rgba(255,255,255,0.14);transform:translateX(3px)}
.cred-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cred-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:rgba(255,255,255,0.05)}
.cred-body{flex:1;min-width:0}
.cred-name{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cred-issuer{font-size:12px;font-weight:600}
.cred-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.ctag{font-size:10px;padding:2px 7px;border-radius:100px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.04em}
.cred-date{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}

/* Issuer renkleri */
.iss-hackviser{color:#a78bfa}.iss-udemy{color:#A435F0}.iss-turkcell{color:#FFC900}
.iss-hackerrank{color:#2ec866}.iss-aws{color:#FF9900}.iss-oracle{color:#F80000}
.iss-google{color:#4285F4}.iss-anthropic{color:#FF6F3C}

/* Profil kartı özel stil */
.profile-card {
  background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, rgba(0,217,255,0.04) 100%);
  border: 1px solid rgba(167,139,250,0.2);
}
.profile-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  background: rgba(167,139,250,0.15);
  color: #a78bfa;
  font-family: 'DM Mono', monospace;
  margin-left: 8px;
}

.stats-row{display:flex;gap:1rem;margin-bottom:2.5rem;flex-wrap:wrap}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.5rem;flex:1;min-width:90px;text-align:center}
.stat-n{font-size:26px;font-weight:800;font-family:'Comfortaa',cursive;color:var(--text-primary)}
.stat-n span{color:var(--cyan);font-size:16px}
.stat-l{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:3px}
</style>
</head>
<body>

<div class="nav-wrap">
  <nav class="nav">
    <a class="nav-brand" href="index.html" target="_self">cyb3rkan.dev</a>
    <a class="nav-home" href="index.html" title="Home">⌂</a>
    <div class="nav-div"></div>
    <div class="nav-links">
      <a class="nav-link" href="projects.html">Projects</a>
      <a class="nav-link active" href="credentials.html">Credentials</a>
      <a class="nav-link" href="skills.html">Skills</a>
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </div>
    <div class="nav-right">
      <div class="nav-dot"><div class="ndot"></div>Available</div>
    </div>
  </nav>
</div>

<section class="section">
  <p class="sec-eyebrow reveal">Achievements</p>
  <h2 class="sec-title reveal d1">My Credentials</h2>
  <p style="font-size:12px;color:var(--text-muted);margin-top:-2.25rem;margin-bottom:2rem;font-family:'DM Mono',monospace" class="reveal d1">Sertifikalar · karta tıkla</p>

  <div class="stats-row reveal d2">
    <div class="stat-box"><div class="stat-n" id="total-count">5<span></span></div><div class="stat-l">Total Certs</div></div>
    <div class="stat-box"><div class="stat-n" style="color:#a78bfa">8+</div><div class="stat-l">CTF Solved</div></div>
    <div class="stat-box"><div class="stat-n" style="font-size:16px;padding-top:6px">CEH / OSCP</div><div class="stat-l">In Progress</div></div>
  </div>

  <div class="filter-bar reveal d2" id="filter-bar">
    <button class="fchip active" data-filter="all">All <span class="cnt" id="cnt-all">5</span></button>
    <button class="fchip" data-filter="Hackviser">Hackviser <span class="cnt">1</span></button>
    <button class="fchip" data-filter="Udemy">Udemy <span class="cnt">3</span></button>
    <button class="fchip" data-filter="Turkcell">Turkcell <span class="cnt">1</span></button>
  </div>

  <div id="cred-container" class="reveal d3"></div>
</section>

<<footer class="footer">
  <div class="footer-brand"><div class="fdot"></div>© 2026 ERKAN ŞAHİN</div>
  <div class="footer-copy">cyb3rkan.dev · Built with Next.js · Deployed on Vercel</div>
</footer>

<script>
const io = new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('on');io.unobserve(x.target)}})},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

const creds = [
  // HACKVISER PROFİLİ (Öne çıkan)
  {year:2026,date:'Active',name:'Hackviser Profile',issuer:'Hackviser Platform',filter:'Hackviser',icon:'🚩',tags:['CTF','FORENSICS','STEGO','PCAP','IDOR','LFI'],dotColor:'#a78bfa',issuerClass:'iss-hackviser',link:'https://app.hackviser.com/profile/cyb3rkan',isProfile:true},
  
  // UDEMY SERTİFİKALARI (İsimleri sen vereceksin)
  {year:2026,date:'2026',name:'CompTIA A+ Core 1 (220-1201)',issuer:'Udemy',filter:'Udemy',icon:'📜',tags:['UDEMY','PENTEST','ETHICAL-HACKING'],dotColor:'#A435F0',issuerClass:'iss-udemy',link:'https://www.udemy.com/certificate/UC-c4d04961-0011-4a8a-ab7e-6a99aa3ae84e/'},
  {year:2026,date:'2026',name:'CompTIA A+ Core 2 (220-1202)',issuer:'Udemy',filter:'Udemy',icon:'📜',tags:['UDEMY','WEB-SECURITY','BUG-BOUNTY'],dotColor:'#A435F0',issuerClass:'iss-udemy',link:'https://www.udemy.com/certificate/UC-e3cdc4a4-68eb-4568-a440-a2a450509ea7/'},
  {year:2026,date:'2026',name:'Python(Basic) - Java(Basic) - C#(Basic)',issuer:'Udemy',filter:'Udemy',icon:'📜',tags:['UDEMY','NETWORK','SECURITY'],dotColor:'#A435F0',issuerClass:'iss-udemy',link:'https://www.udemy.com/certificate/UC-cb6c6ecc-abe3-475a-bd16-7e7361c4adfb/'},
  
  // TURKCELL
  {year:2026,date:'2026',name:'Siber Güvenliğe Giriş',issuer:'Turkcell',filter:'Turkcell',icon:'📡',tags:['TURKCELL','YAZILIM','EGITIM'],dotColor:'#FFC900',issuerClass:'iss-turkcell',link:'https://gelecegiyazanlar.turkcell.com.tr/sertifika/5f1217b50d0b4d758070f8666d648d94'},
];

function renderCreds(filter) {
  const filtered = filter === 'all' ? creds : creds.filter(c => c.filter === filter);
  const byYear = {};
  filtered.forEach(c => { if(!byYear[c.year]) byYear[c.year]=[]; byYear[c.year].push(c); });
  const container = document.getElementById('cred-container');
  container.innerHTML = '';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year => {
    const yl = document.createElement('div');
    yl.className='year-hd';
    yl.innerHTML = `${year} <span style="color:var(--text-muted);font-size:11px">${byYear[year].length} certs</span>`;
    container.appendChild(yl);
    const list = document.createElement('div');
    list.className='cred-list';
    byYear[year].forEach(c => {
      const item = document.createElement('div');
      // Profil kartı mı yoksa normal sertifika mı?
      const isProfile = c.isProfile ? 'profile-card' : '';
      item.className=`cred-item ${isProfile}`;
      
      if(c.link && c.link !== '#') {
        item.style.cursor = 'pointer';
        item.addEventListener('click', () => window.open(c.link, '_blank', 'noopener'));
      }
      
      const profileBadge = c.isProfile ? '<span class="profile-badge">LIVE PROFILE</span>' : '';
      const tagsHtml = c.tags.map(t=>`<span class="ctag" style="background:${c.dotColor}18;color:${c.dotColor};border:1px solid ${c.dotColor}28">${t}</span>`).join('');
      
      item.innerHTML = `
        <div class="cred-dot" style="background:${c.dotColor}"></div>
        <div class="cred-icon">${c.icon}</div>
        <div class="cred-body">
          <div class="cred-name">${c.name}${profileBadge}</div>
          <div class="cred-issuer ${c.issuerClass}">${c.issuer}</div>
          <div class="cred-tags">${tagsHtml}</div>
        </div>
        <div class="cred-date">${c.date}</div>
      `;
      list.appendChild(item);
    });
    container.appendChild(list);
  });
}

renderCreds('all');

document.querySelectorAll('.fchip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderCreds(btn.dataset.filter);
  });
});
</script>
</body>
</html>
